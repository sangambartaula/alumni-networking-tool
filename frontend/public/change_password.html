<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password – UNT Alumni Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --page-bg:#f2f3f7;--panel:#ffffff;--muted:#6b7280;--border:#e5e7eb;
      --brand:#00853E;--brand-dark:#056b33;--text:#111827;
      --danger:#ef4444;--success:#22c55e;--warn-bg:#fffbeb;--warn-border:#fbbf24;--warn-text:#92400e;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:var(--page-bg);color:var(--text);font-family:Inter,system-ui,-apple-system,sans-serif;line-height:1.5}

    .container{max-width:460px;margin:60px auto;padding:16px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.06);padding:32px}
    .card-logo{display:flex;justify-content:center;margin-bottom:12px}
    .card-logo img{height:56px;width:auto}
    .card h1{text-align:center;font-size:22px;margin:0 0 4px}
    .card .subtitle{text-align:center;color:var(--muted);font-size:14px;margin:0 0 8px}

    .warn-banner{background:var(--warn-bg);border:1px solid var(--warn-border);color:var(--warn-text);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:18px;display:none}

    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-weight:600;font-size:14px;margin-bottom:4px}
    .form-group input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border .15s}
    .form-group input:focus{border-color:var(--brand)}

    .pw-hints{margin:6px 0 0;padding:0;list-style:none;font-size:12px}
    .pw-hints li{padding:2px 0;color:var(--muted);transition:color .2s}
    .pw-hints li.pass{color:var(--success)}
    .pw-hints li.fail{color:var(--danger)}

    .btn-submit{width:100%;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
    .btn-submit:hover{background:var(--brand-dark)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}

    .error-msg{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
    .success-msg{background:#f0fdf4;border:1px solid #86efac;color:#166534;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}

    .links{text-align:center;margin-top:18px;font-size:14px}
    .links a{color:var(--brand);text-decoration:none}
    .links a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-logo">
        <img src="./assets/unt-logo.png" alt="UNT Logo">
      </div>
      <h1>Set New Password</h1>
      <p class="subtitle" id="subtitle">You must set a new password to continue.</p>

      <div id="warnBanner" class="warn-banner">
        An admin has reset your password. Please create a new one.
      </div>
      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <form id="changePwForm" autocomplete="off">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" placeholder="Enter new password" required autofocus>
          <ul class="pw-hints" id="pwHints">
            <li data-rule="length">At least 10 characters</li>
            <li data-rule="upper">1 uppercase letter</li>
            <li data-rule="lower">1 lowercase letter</li>
            <li data-rule="number">1 number</li>
            <li data-rule="special">1 special character</li>
          </ul>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter new password" required>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Set Password</button>
      </form>

      <div class="links">
        <a href="/alumni">Skip (go to dashboard)</a>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const form = document.getElementById('changePwForm');
    const pwInput = document.getElementById('newPassword');
    const confirmInput = document.getElementById('confirmPassword');
    const hints = document.getElementById('pwHints');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const warnBanner = document.getElementById('warnBanner');

    const rules = {
      length: p => p.length >= 10,
      upper: p => /[A-Z]/.test(p),
      lower: p => /[a-z]/.test(p),
      number: p => /\d/.test(p),
      special: p => /[!@#$%^&*()\\_+\-=\[\]{}|;:'",.<>?\/]/.test(p),
    };

    pwInput.addEventListener('input', function(){
      const pw = this.value;
      hints.querySelectorAll('li').forEach(li => {
        const rule = li.dataset.rule;
        if(rules[rule]) li.className = rules[rule](pw) ? 'pass' : 'fail';
      });
    });

    // Check if this is a forced change
    async function checkMeStatus(){
      try{
        const resp = await fetch('/api/auth/me');
        if(!resp.ok) return;
        const data = await resp.json();
        if(data.must_change_password) warnBanner.style.display = 'block';
      } catch(e){}
    }
    checkMeStatus();

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      const newPw = pwInput.value;
      const confirm = confirmInput.value;

      if(newPw !== confirm){
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      try{
        const resp = await fetch('/api/auth/force-change-password', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({new_password: newPw})
        });
        const data = await resp.json();
        if(data.success){
          successMsg.textContent = data.message || 'Password set! Redirecting…';
          successMsg.style.display = 'block';
          setTimeout(() => window.location.href = data.redirect || '/alumni', 1200);
        } else {
          let msg = data.error || 'Failed to set password.';
          if(data.details) msg += ' ' + data.details.join(' ');
          errorMsg.textContent = msg;
          errorMsg.style.display = 'block';
        }
      } catch(err){
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Set Password';
      }
    });
  })();
  </script>
</body>
</html>
