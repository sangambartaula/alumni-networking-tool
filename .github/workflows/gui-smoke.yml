name: GUI Smoke

on:
  pull_request:
    paths:
      - "Alumni Scraper App.spec"
      - ".github/workflows/gui-smoke.yml"
      - "requirements.txt"
      - "scraper_gui.py"
      - "tests/test_scraper_gui.py"
  push:
    paths:
      - "Alumni Scraper App.spec"
      - ".github/workflows/gui-smoke.yml"
      - "requirements.txt"
      - "scraper_gui.py"
      - "tests/test_scraper_gui.py"

jobs:
  gui-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Run scraper GUI tests
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/test_scraper_gui.py

      - name: Launch scraper GUI offscreen
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python - <<'PY'
          from PyQt6.QtWidgets import QApplication
          import scraper_gui

          app = QApplication.instance() or QApplication([])
          win = scraper_gui.ScraperApp()
          win.close()
          app.quit()
          print("GUI smoke launch passed")
          PY

      - name: Validate PyInstaller spec
        shell: bash
        run: python -m PyInstaller --noconfirm --clean --distpath pyinstaller-dist --workpath pyinstaller-build "Alumni Scraper App.spec"
