name: GUI Smoke

on:
  pull_request:
    paths:
      - "Alumni Scraper App.spec"
      - ".github/workflows/gui-smoke.yml"
      - "requirements.txt"
      - "scraper_gui.py"
      - "scraper/**"
      - "backend/**"
      - "tests/**"
  push:
    paths:
      - "Alumni Scraper App.spec"
      - ".github/workflows/gui-smoke.yml"
      - "requirements.txt"
      - "scraper_gui.py"
      - "scraper/**"
      - "backend/**"
      - "tests/**"

jobs:
  # ── Unit tests (pure logic, no GUI, no external services) ───────────
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run scraper logic tests
        shell: bash
        run: python -m pytest tests/test_scraper_logic.py -v

      - name: Run degree normalization tests
        shell: bash
        run: python -m pytest tests/test_degree_normalization.py -v

      - name: Run job title normalization tests
        shell: bash
        run: python -m pytest tests/test_job_title_normalization.py -v

      - name: Run seniority detection tests
        shell: bash
        run: python -m pytest tests/test_seniority_detection.py -v

      - name: Run entity classifier tests
        shell: bash
        run: python -m pytest tests/test_entity_classifier.py -v

      - name: Run relevance scorer tests
        shell: bash
        run: python -m pytest tests/test_relevance_scorer.py -v

      - name: Run Groq prompt hardening tests
        shell: bash
        run: python -m pytest tests/test_groq_prompt_hardening.py -v

      - name: Run Groq extractor education cleanup tests
        shell: bash
        run: python -m pytest tests/test_groq_extractor_education_cleanup.py -v

      - name: Run Groq extractor experience regression tests
        shell: bash
        run: python -m pytest tests/test_groq_extractor_experience_regression.py -v

      - name: Run working-while-studying fallback tests
        shell: bash
        run: python -m pytest tests/test_working_while_studying_fallback.py -v

      - name: Run URL normalization and cleanup tests
        shell: bash
        run: python -m pytest tests/test_url_normalization.py -v

      - name: Run CSV schema and migration tests
        shell: bash
        run: python -m pytest tests/test_database_handler.py -v

      - name: Run database handler FutureWarning tests
        shell: bash
        run: python -m pytest tests/test_database_handler_futurewarning.py -v

      - name: Run history manager live tracking tests
        shell: bash
        run: python -m pytest tests/test_history_manager_live_tracking.py -v

      - name: Run backend filter API tests
        shell: bash
        run: python -m pytest tests/test_backend_filter_api.py -v

      - name: Run scraper activity API tests
        shell: bash
        run: python -m pytest tests/test_scraper_activity_api.py -v

      - name: Run auth tests
        shell: bash
        run: python -m pytest tests/test_auth.py -v

      - name: Run discipline search mode tests
        shell: bash
        run: python -m pytest tests/test_discipline_search_mode.py -v

      - name: Run scraper utility tests
        shell: bash
        run: python -m pytest tests/test_scraper_utils.py -v

      - name: Run scraper main logic tests
        shell: bash
        run: python -m pytest tests/test_scraper_main.py -v

      - name: Run CSV export frontend contract tests
        shell: bash
        run: python -m pytest tests/test_csv_export_frontend.py -v

  # ── GUI smoke tests (Qt widgets, offscreen) ─────────────────────────
  gui-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run scraper GUI tests
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/test_scraper_gui.py -v

      - name: Launch scraper GUI offscreen
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python - <<'PY'
          from PyQt6.QtWidgets import QApplication
          import scraper_gui

          app = QApplication.instance() or QApplication([])
          win = scraper_gui.ScraperApp()
          win.close()
          app.quit()
          print("GUI smoke launch passed")
          PY

  # ── PyInstaller build validation ────────────────────────────────────
  pyinstaller-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pillow

      - name: Validate PyInstaller spec
        shell: bash
        run: |
          target="Alumni Scraper App.spec"
          if [[ ! -f "$target" ]]; then
            echo "Spec file not found in checkout; falling back to scraper_gui.py"
            target="scraper_gui.py"
          fi
          python -m PyInstaller --noconfirm --clean --distpath pyinstaller-dist --workpath pyinstaller-build "$target"
